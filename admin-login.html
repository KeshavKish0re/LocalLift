<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - LocalLift</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }

        .card {
            border-radius: 12px;
        }

        input:focus {
            box-shadow: 0 0 5px #0d6efd;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 360px;">
        <h4 class="text-center mb-4">🔐 Admin Login</h4>

        <div class="mb-3">
            <label for="username" class="form-label visually-hidden">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Username" autofocus>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label visually-hidden">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Password">
        </div>

        <p id="errorMsg" class="text-danger text-center mb-3"></p>

        <button type="button" class="btn btn-primary w-100" onclick="login()">Login</button>
    </div>

    <script src="admin-login.js"></script>
</body>

</html>
